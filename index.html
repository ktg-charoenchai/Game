<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="stylesheet" href="style.css">
  <title>In Game🥵</title>
</head>
<body>

  <div class="container">
    <h1>คำถาม (15 x 2 ข้อ) 🥰</h1>
    <div id="progress">ข้อที่ <span id="questionNum">1</span> / 30</div>
    
    <div id="question-area">
      <h2 id="questionTitle"></h2>

      <img id="questionImage" src="" alt="คำถาม" style="display: none;">

      <video id="questionVideo" controls width="100%" height="auto" style="display: none;">
        <source src="" type="video/mp4">
        เบราว์เซอร์ของคุณไม่รองรับวิดีโอ
      </video>

      <div id="questionAudioContainer" style="display: none; text-align: center; margin: 20px 0;">
        <audio id="questionAudio" controls style="width: 100%; max-width: 500px;">
          <source src="" type="audio/mpeg">
          เบราว์เซอร์ของคุณไม่รองรับไฟล์เสียง
        </audio>
      </div>

      <div id="choices"></div>

      <div id="feedback"></div>
      <button id="nextBtn" disabled>ข้อต่อไป →</button>
    </div>

    <div id="result" style="display: none;">
      <h2>🎉 จบเกมแล้ว!</h2>
      <p>คะแนนรวมทั้งหมด😮</p>
      <div class="score-box">
        <strong><span id="finalScore">0</span></strong> / 30
      </div>
      <p id="scoreMessage" class="score-message"></p>
      
      <button id="nextPageBtn">กลับไปหน้าหลัก</button>
      <button id="restartBtn">เล่นใหม่</button>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
